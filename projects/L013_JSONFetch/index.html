<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.cdnfonts.com/css/casino" rel="stylesheet">
</head>
<body>

    <!-- <h1>Blackjack Game</h1> -->

    <div class="bot-container">
        <div class="info">
                <p>Bet: </p>
                <select name="bet" id="betSelect">
                    <option value="5">5</option>
                    <option value="10">10</option>
                    <option value="25">25</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                    <option value="250">250</option>
                    <option value="500">500</option>
                </select>
        </div>

        <div class="image">
            <img src="" alt="" id="cardImage1">
        </div>

        <div class="info2">
            <h2>Score</h2>
            <p>Dealer: <span id="dealerScore">0</span></p>
            <p>Player: <span id="playerScore">0</span></p>
        </div>
    </div>

    <div class="player-container">
        <button id="hitButton">Hit</button>
            <div class="image">
                <img src="" alt="" id="cardImage2">
            </div>
        <button id="standButton">Stand</button>
    </div>

    <div class="player-container">
        <button id="DoubleButton">Double Down</button>
        <button id="SplitButton">Split</button>
        <button id="NewGameButton">New Game</button>
    </div>

    
    
    <script src="main.js"></script>
</body>
</html>
